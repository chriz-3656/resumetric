<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- White Background -->
  <circle cx="256" cy="256" r="256" fill="#FFFFFF"/>
  
  <!-- Brown Ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#C8573C" stroke-width="16"/>

  <!-- Document/Paper Shape -->
  <path d="M157 95 L291 95 L371 175 L371 401 C371 410 364 417 355 417 L157 417 C148 417 141 410 141 401 L141 111 C141 102 148 95 157 95 Z" fill="#F7F4EE" stroke="#181614" stroke-width="16" stroke-linejoin="round"/>
  
  <!-- Folded Corner -->
  <path d="M291 95 L291 175 L371 175" fill="#EAE5DD" stroke="#181614" stroke-width="16" stroke-linejoin="round"/>

  <!-- Paper Lines -->
  <line x1="190" y1="220" x2="320" y2="220" stroke="#181614" stroke-width="14" stroke-linecap="round"/>
  <line x1="190" y1="280" x2="320" y2="280" stroke="#181614" stroke-width="14" stroke-linecap="round"/>
  <line x1="190" y1="340" x2="260" y2="340" stroke="#181614" stroke-width="14" stroke-linecap="round"/>

  <!-- Big Checkmark (Tick) overlapping -->
  <!-- White stroke to lift it off the paper -->
  <path d="M 230 290 L 300 360 L 430 180" fill="none" stroke="#FFFFFF" stroke-width="54" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- The Checkmark -->
  <path d="M 230 290 L 300 360 L 430 180" fill="none" stroke="#C8573C" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
